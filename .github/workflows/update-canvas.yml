name: Update Supermatch Canvas

on:
  schedule:
    # GitHub Actions는 UTC 기준 — KST에서 9시간 빼서 입력
    # KST 운영 의도:
    #   08:00 — 새 하루 시작. 어제 결과는 잠시 더 보이고 오늘 일정으로 전환
    #   17:00 — 주중경기 시작 직전, 주말경기 17시 시작 직전. 선발투수 거의 확정
    #   20:00 — 모든 경기 진행 중. 점수 + 진행 상태 표시
    #   23:30 — 거의 모든 경기 종료. 최종 결과 + 응원팀 1~2줄 요약
    - cron: "0 23 * * *"   # KST 08:00 (UTC 23:00, 전날)
    - cron: "0 8 * * *"    # KST 17:00 (UTC 08:00)
    - cron: "0 11 * * *"   # KST 20:00 (UTC 11:00)
    - cron: "30 14 * * *"  # KST 23:30 (UTC 14:30)
  workflow_dispatch:        # 수동 실행 버튼

concurrency:
  group: kbo-canvas
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Update Canvas
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CANVAS_ID: ${{ secrets.SLACK_CANVAS_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py update
